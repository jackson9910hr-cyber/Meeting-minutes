<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>회의록 관리 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg:        #1e1b18;
    --surface:   #272320;
    --card:      #2f2b28;
    --border:    #3d3830;
    --accent:    #e8a455;
    --accent2:   #d4845a;
    --accent-l:  rgba(232,164,85,0.13);
    --text:      #f2ede8;
    --muted:     #9c9189;
    --success:   #6dbf8a;
    --danger:    #e07070;
    --shadow:    0 2px 8px rgba(0,0,0,0.25);
    --shadow-md: 0 6px 24px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

/* 헤더 */
header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 0 36px;
display: flex;
align-items: center;
justify-content: space-between;
height: 62px;
position: sticky;
top: 0;
z-index: 100;
box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
width: 36px; height: 36px;
background: linear-gradient(135deg, var(–accent), var(–accent2));
border-radius: 9px;
display: flex; align-items: center; justify-content: center;
font-size: 1.1rem;
box-shadow: 0 2px 8px rgba(232,164,85,0.35);
}
.logo-text {
font-size: 1.05rem;
font-weight: 700;
color: var(–text);
letter-spacing: -0.4px;
}
.logo-text span { color: var(–accent); }
.header-right { display: flex; align-items: center; gap: 10px; }
.header-meta {
font-size: 0.77rem;
color: var(–muted);
margin-right: 8px;
font-variant-numeric: tabular-nums;
}

/* 탭 */
.tabs {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 0 36px;
display: flex;
position: sticky;
top: 62px;
z-index: 90;
}
.tab-btn {
padding: 0 26px;
height: 48px;
background: none;
border: none;
color: var(–muted);
font-size: 0.9rem;
font-weight: 600;
cursor: pointer;
border-bottom: 2.5px solid transparent;
transition: all 0.18s;
font-family: inherit;
display: flex; align-items: center; gap: 7px;
}
.tab-btn.active { color: var(–accent); border-bottom-color: var(–accent); }
.tab-btn:hover:not(.active) { color: var(–text); }
.tab-count {
background: var(–accent-l);
color: var(–accent);
font-size: 0.72rem;
font-weight: 700;
padding: 2px 8px;
border-radius: 20px;
border: 1px solid rgba(232,164,85,0.25);
}

/* 레이아웃 */
main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
.panel { display: none; animation: fadeUp 0.2s ease; }
.panel.active { display: block; }
@keyframes fadeUp {
from { opacity:0; transform:translateY(8px); }
to   { opacity:1; transform:translateY(0); }
}

.section-header { margin-bottom: 20px; }
.section-title  { font-size: 1.05rem; font-weight: 700; color: var(–text); letter-spacing: -0.3px; }
.section-sub    { font-size: 0.82rem; color: var(–muted); margin-top: 4px; }

/* 카드 */
.card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 14px;
padding: 26px 30px;
margin-bottom: 18px;
box-shadow: var(–shadow);
}
.card-header {
display: flex; align-items: center; gap: 10px;
margin-bottom: 22px;
padding-bottom: 16px;
border-bottom: 1px solid var(–border);
}
.card-icon {
width: 30px; height: 30px;
background: var(–accent-l);
border: 1px solid rgba(232,164,85,0.2);
border-radius: 8px;
display: flex; align-items: center; justify-content: center;
font-size: 0.9rem;
}
.card-title { font-size: 0.93rem; font-weight: 700; color: var(–text); }

/* 폼 */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.form-group { display: flex; flex-direction: column; gap: 7px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 0.79rem; font-weight: 600; color: var(–muted); text-transform: uppercase; letter-spacing: 0.4px; }
.required::after { content: ’ *’; color: var(–accent); }

input[type=“text”], input[type=“date”], input[type=“time”], textarea {
background: var(–card);
border: 1px solid var(–border);
border-radius: 9px;
color: var(–text);
font-size: 0.93rem;
padding: 11px 14px;
font-family: inherit;
transition: border-color 0.15s, box-shadow 0.15s;
outline: none;
resize: vertical;
width: 100%;
}
input:focus, textarea:focus {
border-color: var(–accent);
box-shadow: 0 0 0 3px rgba(232,164,85,0.12);
}
input::placeholder, textarea::placeholder { color: var(–muted); opacity: 0.7; }
textarea { min-height: 100px; line-height: 1.6; }

/* 버튼 */
.btn {
padding: 10px 20px;
border-radius: 9px;
border: none;
font-size: 0.88rem;
font-weight: 600;
cursor: pointer;
transition: all 0.15s;
font-family: inherit;
display: inline-flex; align-items: center; gap: 7px;
white-space: nowrap;
}
.btn-primary {
background: linear-gradient(135deg, var(–accent), var(–accent2));
color: #1e1b18;
box-shadow: 0 2px 10px rgba(232,164,85,0.3);
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,164,85,0.4); }
.btn-success {
background: linear-gradient(135deg, #4caf7d, #6dbf8a);
color: #1a2e22;
box-shadow: 0 2px 8px rgba(109,191,138,0.25);
}
.btn-success:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-outline {
background: transparent;
border: 1px solid var(–border);
color: var(–muted);
}
.btn-outline:hover { border-color: var(–accent); color: var(–accent); background: var(–accent-l); }
.btn-ghost {
background: transparent; border: none; color: var(–muted);
padding: 6px 11px; font-size: 0.85rem;
}
.btn-ghost:hover { color: var(–danger); }
.btn-sm { padding: 7px 14px; font-size: 0.82rem; border-radius: 7px; }
.form-actions {
display: flex; gap: 10px; margin-top: 22px;
justify-content: flex-end;
padding-top: 18px;
border-top: 1px solid var(–border);
}

/* 통계 */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 22px; }
.stat-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 13px;
padding: 20px 22px;
box-shadow: var(–shadow);
display: flex; align-items: center; gap: 14px;
transition: box-shadow 0.15s, border-color 0.15s;
}
.stat-card:hover { box-shadow: var(–shadow-md); border-color: rgba(232,164,85,0.3); }
.stat-icon {
width: 44px; height: 44px;
border-radius: 11px;
display: flex; align-items: center; justify-content: center;
font-size: 1.25rem; flex-shrink: 0;
}
.si-a { background: rgba(232,164,85,0.15); border: 1px solid rgba(232,164,85,0.2); }
.si-b { background: rgba(109,191,138,0.15); border: 1px solid rgba(109,191,138,0.2); }
.si-c { background: rgba(212,132,90,0.15);  border: 1px solid rgba(212,132,90,0.2); }
.stat-num {
font-size: 1.8rem; font-weight: 700;
color: var(–accent);
letter-spacing: -1px; line-height: 1;
}
.stat-label { font-size: 0.78rem; color: var(–muted); margin-top: 3px; }

/* 검색 */
.search-bar { display: flex; gap: 10px; margin-bottom: 18px; }
.search-wrap { flex: 1; position: relative; }
.search-wrap input { padding-left: 36px; }
.search-ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(–muted); font-size: 0.9rem; pointer-events: none; }

/* 테이블 */
.table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(–border); }
table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
thead tr { background: var(–card); }
th {
padding: 12px 14px;
text-align: left;
color: var(–muted);
font-weight: 600;
font-size: 0.76rem;
text-transform: uppercase;
letter-spacing: 0.5px;
border-bottom: 1px solid var(–border);
white-space: nowrap;
}
td {
padding: 13px 14px;
border-bottom: 1px solid var(–border);
vertical-align: middle;
color: var(–muted);
line-height: 1.5;
}
.td-main { color: var(–text); font-weight: 500; }
.td-ell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(–card); transition: background 0.12s; }

.badge-no {
display: inline-flex; align-items: center; justify-content: center;
width: 26px; height: 26px;
border-radius: 7px;
background: var(–accent-l);
border: 1px solid rgba(232,164,85,0.2);
color: var(–accent);
font-size: 0.76rem; font-weight: 700;
}

/* 빈 상태 */
.empty-state { text-align: center; padding: 60px 20px; color: var(–muted); }
.empty-icon  { font-size: 2.8rem; margin-bottom: 14px; opacity: 0.4; }
.empty-title { font-size: 0.93rem; font-weight: 600; color: var(–text); margin-bottom: 6px; }
.empty-sub   { font-size: 0.82rem; }

/* 토스트 */
#toast {
position: fixed; bottom: 28px; right: 28px;
padding: 13px 20px;
border-radius: 10px;
font-weight: 600; font-size: 0.88rem;
opacity: 0; transform: translateY(14px);
transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
z-index: 999; pointer-events: none;
box-shadow: var(–shadow-md);
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.ok  { background: var(–success); color: #1a2e22; }
#toast.err { background: var(–danger);  color: #fff; }

/* 모달 */
.modal-overlay {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,0.6);
backdrop-filter: blur(4px);
z-index: 200; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px; padding: 30px;
width: 100%; max-width: 580px; max-height: 85vh; overflow-y: auto;
box-shadow: var(–shadow-md);
animation: fadeUp 0.2s ease;
}
.modal-header {
display: flex; justify-content: space-between; align-items: flex-start;
margin-bottom: 22px; padding-bottom: 16px; border-bottom: 1px solid var(–border);
}
.modal-title { font-size: 1rem; font-weight: 700; color: var(–accent); }
.modal-date  { font-size: 0.79rem; color: var(–muted); margin-top: 3px; }
.modal-field { margin-bottom: 16px; }
.modal-label { font-size: 0.75rem; color: var(–muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
.modal-value {
background: var(–card); border: 1px solid var(–border);
border-radius: 9px; padding: 13px 15px;
font-size: 0.91rem; line-height: 1.65; white-space: pre-wrap; color: var(–text);
}
.modal-value.hl {
border-left: 3px solid var(–accent);
background: var(–accent-l);
}

@media (max-width: 640px) {
.form-grid { grid-template-columns: 1fr; }
.stats-row { grid-template-columns: 1fr; }
header     { padding: 0 16px; }
.tabs      { padding: 0 12px; }
main       { padding: 18px 12px; }
.card      { padding: 18px 16px; }
.header-meta { display: none; }
.tab-btn   { padding: 0 14px; font-size: 0.85rem; }
}
</style>

</head>

<script>
  let meetings = [];

  function init() {
    loadData();
    clearForm();
    updateTabCount();
    updateHeaderDate();
    setInterval(updateHeaderDate, 30000);
  }

  function updateHeaderDate() {
    const now = new Date();
    document.getElementById('header-date').textContent =
      now.toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'}) + '  ' +
      now.toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
  }

  function loadData() {
    try { meetings = JSON.parse(localStorage.getItem('meeting_minutes') || '[]'); }
    catch(e) { meetings = []; }
  }
  function saveData() { localStorage.setItem('meeting_minutes', JSON.stringify(meetings)); }

  function switchTab(tab, el) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    el.classList.add('active');
    if (tab === 'history') { updateStats(); renderTable(); }
  }

  function updateTabCount() {
    document.getElementById('tab-count').textContent = meetings.length;
  }

  function saveMeeting() {
    const date    = document.getElementById('f-date').value;
    const time    = document.getElementById('f-time').value;
    const agenda  = document.getElementById('f-agenda').value.trim();
    const content = document.getElementById('f-content').value.trim();
    const action  = document.getElementById('f-action').value.trim();
    if (!date || !agenda) { showToast('날짜와 안건은 필수 항목입니다', 'err'); return; }
    meetings.unshift({ id: Date.now(), date, time, agenda, content, action, createdAt: new Date().toISOString() });
    saveData();
    updateTabCount();
    clearForm();
    showToast('회의록이 저장되었습니다', 'ok');
  }

  function clearForm() {
    ['f-agenda','f-content','f-action'].forEach(id => document.getElementById(id).value = '');
    const now = new Date();
    document.getElementById('f-date').value = now.toISOString().split('T')[0];
    document.getElementById('f-time').value = now.toTimeString().slice(0,5);
  }

  function renderTable() {
    const kw = document.getElementById('search-input').value.toLowerCase();
    const filtered = meetings.filter(m =>
      m.agenda.toLowerCase().includes(kw) ||
      (m.content||'').toLowerCase().includes(kw) ||
      (m.action||'').toLowerCase().includes(kw)
    );
    const tbody = document.getElementById('table-body');
    const empty = document.getElementById('empty-state');
    if (filtered.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    tbody.innerHTML = filtered.map((m,i) => `
      <tr>
        <td><span class="badge-no">${filtered.length - i}</span></td>
        <td style="font-size:0.85rem">${m.date}</td>
        <td style="font-size:0.85rem;color:var(--muted)">${m.time||'—'}</td>
        <td class="td-main td-ell">${m.agenda}</td>
        <td class="td-ell">${m.action||'—'}</td>
        <td><button class="btn btn-outline btn-sm" onclick="showDetail(${m.id})">보기</button></td>
        <td><button class="btn btn-ghost" onclick="deleteMeeting(${m.id})">✕</button></td>
      </tr>
    `).join('');
  }

  function updateStats() {
    const now = new Date();
    const ym  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    document.getElementById('stat-total').textContent  = meetings.length;
    document.getElementById('stat-month').textContent  = meetings.filter(m => m.date.startsWith(ym)).length;
    document.getElementById('stat-recent').textContent = meetings.length > 0 ? meetings[0].date : '—';
  }

  function showDetail(id) {
    const m = meetings.find(x => x.id === id);
    if (!m) return;
    document.getElementById('modal-title').textContent = m.agenda;
    document.getElementById('modal-date').textContent  = `${m.date}  ${m.time||''}`;
    document.getElementById('modal-content').innerHTML = `
      <div class="modal-field">
        <div class="modal-label">안건 / 주제</div>
        <div class="modal-value hl">${m.agenda}</div>
      </div>
      <div class="modal-field">
        <div class="modal-label">회의 내용 (세부)</div>
        <div class="modal-value">${m.content||'내용 없음'}</div>
      </div>
      <div class="modal-field">
        <div class="modal-label">결정사항 / 액션아이템</div>
        <div class="modal-value">${m.action||'내용 없음'}</div>
      </div>
    `;
    document.getElementById('modal').classList.add('show');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal'))
      document.getElementById('modal').classList.remove('show');
  }

  function deleteMeeting(id) {
    if (!confirm('이 회의록을 삭제하시겠습니까?')) return;
    meetings = meetings.filter(m => m.id !== id);
    saveData(); updateTabCount(); updateStats(); renderTable();
    showToast('삭제되었습니다', 'err');
  }

  function exportExcel() {
    if (meetings.length === 0) { showToast('저장된 회의록이 없습니다', 'err'); return; }
    if (typeof XLSX === 'undefined') { showToast('라이브러리 로딩 중입니다', 'err'); return; }
    const data = [...meetings].reverse().map((m,i) => ({
      'No'                  : i+1,
      '날짜'                : m.date,
      '시간'                : m.time||'',
      '안건/주제'           : m.agenda,
      '회의내용(세부)'      : m.content||'',
      '결정사항/액션아이템' : m.action||'',
      '작성일시'            : new Date(m.createdAt).toLocaleString('ko-KR')
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    ws['!cols'] = [{wch:5},{wch:12},{wch:8},{wch:32},{wch:44},{wch:44},{wch:22}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '회의록');
    XLSX.writeFile(wb, '회의록.xlsx');
    showToast('회의록.xlsx 저장 완료', 'ok');
  }

  function importExcel() { document.getElementById('fileInput').click(); }

  function handleFileImport(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const wb   = XLSX.read(e.target.result, { type:'binary' });
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws);
        const imported = rows.map(row => ({
          id: Date.now() + Math.random(),
          date: String(row['날짜']||''), time: String(row['시간']||''),
          agenda: row['안건/주제']||'', content: row['회의내용(세부)']||'',
          action: row['결정사항/액션아이템']||'',
          createdAt: row['작성일시']||new Date().toISOString()
        }));
        const keys = new Set(meetings.map(m => m.date+'|'+m.agenda));
        const newItems = imported.filter(m => !keys.has(m.date+'|'+m.agenda));
        meetings = [...newItems, ...meetings];
        meetings.sort((a,b) => new Date(b.date) - new Date(a.date));
        saveData(); updateTabCount();
        showToast(`${newItems.length}건 불러왔습니다`, 'ok');
      } catch(err) { showToast('파일 읽기 오류', 'err'); }
    };
    reader.readAsBinaryString(file);
    event.target.value = '';
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = (type==='ok' ? '✓  ' : '✕  ') + msg;
    t.className = `show ${type}`;
    clearTimeout(t._t);
    t._t = setTimeout(() => t.className = '', 2800);
  }

  init();
</script>

</body>
</html>
